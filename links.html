<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ВСП «ОФККТ ОНУ імені І. І. Мечникова» — посилання</title>
<meta name="theme-color" content="#0E3A6E">
<meta name="description" content="Офіційні сторінки та контакти ВСП «ОФККТ ОНУ імені І. І. Мечникова»">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@700&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0E3A6E;
    --blue:#1F6FC2;
    --gold:#F4B400;
    --gold-deep:#E0A100;
    --ink:#16273F;
    --ink-soft:#5C6E86;
    --paper:#FFFFFF;
    --bg:#EAF2FB;
    --line:rgba(14,58,110,.10);
    --shadow:0 14px 34px -16px rgba(14,58,110,.30);
    --radius:18px;
    color-scheme:light;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:"PT Sans",system-ui,sans-serif;
    color:var(--ink);
    background:var(--bg);
    min-height:100vh;min-height:100dvh;
    display:flex;justify-content:center;
    padding:46px 20px calc(40px + env(safe-area-inset-bottom));
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:-1;
    background:
      radial-gradient(60% 42% at 50% -6%, rgba(244,180,0,.16), transparent 60%),
      radial-gradient(80% 50% at 50% 0%, rgba(31,111,194,.18), transparent 62%),
      linear-gradient(180deg, var(--bg) 0%, #F6FAFE 56%);
  }

  .card{width:100%;max-width:430px;display:flex;flex-direction:column;align-items:center;text-align:center}

  /* ---- Логотип з сонячними променями (мотив герба) ---- */
  .brandmark{position:relative;width:170px;height:170px;display:grid;place-items:center;margin-bottom:16px}
  .rays{
    position:absolute;inset:0;border-radius:50%;
    background:repeating-conic-gradient(from 0deg,
      rgba(244,180,0,.28) 0deg 6deg, transparent 6deg 18deg);
    -webkit-mask:radial-gradient(circle, #000 38%, transparent 70%);
    mask:radial-gradient(circle, #000 38%, transparent 70%);
    opacity:.7;
  }
  .avatar{
    position:relative;width:118px;height:118px;border-radius:50%;
    background:var(--paper);overflow:hidden;
    box-shadow:0 10px 26px -10px rgba(14,58,110,.45);
    border:3px solid var(--gold);
  }
  .avatar img{width:100%;height:100%;object-fit:contain;display:block}

  .eyebrow{
    font-weight:700;font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--blue);margin-bottom:7px;
  }
  .name{
    font-family:"PT Serif",Georgia,serif;font-weight:700;
    font-size:clamp(20px,5vw,25px);line-height:1.22;color:var(--navy);
    max-width:22ch;text-wrap:balance;
  }
  .divider{width:60px;height:4px;border-radius:4px;margin:16px 0 12px;
    background:linear-gradient(90deg,var(--blue),var(--gold))}
  .tagline{font-size:15px;color:var(--ink-soft);line-height:1.5;max-width:30ch}

  /* ---- Посилання ---- */
  .links{width:100%;margin-top:28px;display:flex;flex-direction:column;gap:13px}
  .link{
    display:flex;align-items:center;gap:14px;
    padding:15px 16px;background:var(--paper);
    border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);text-decoration:none;color:var(--ink);
    transition:transform .18s ease,border-color .18s ease,background .18s ease;
    animation:rise .5s ease both;animation-delay:var(--d,0s);
  }
  .link:hover,.link:focus-visible{
    transform:translateY(-2px);
    border-color:color-mix(in srgb,var(--brand) 55%, var(--line));
    background:color-mix(in srgb,var(--brand) 6%, var(--paper));outline:none;
  }
  .link:focus-visible{outline:2px solid var(--brand);outline-offset:2px}
  .link:active{transform:translateY(0)}
  .link__icon{
    flex:0 0 auto;width:46px;height:46px;border-radius:13px;display:grid;place-items:center;
    background:color-mix(in srgb,var(--brand) 13%, transparent);color:var(--brand);
    transition:background .18s ease,color .18s ease;
  }
  .link:hover .link__icon,.link:focus-visible .link__icon{background:var(--brand);color:#fff}
  .link__icon svg{width:24px;height:24px;display:block}
  .link__text{flex:1 1 auto;min-width:0;text-align:left;display:flex;flex-direction:column;gap:2px}
  .link__label{font-weight:700;font-size:16px;line-height:1.25;color:var(--navy)}
  .link__note{font-size:13px;color:var(--ink-soft);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .link__arrow{flex:0 0 auto;color:var(--ink-soft);opacity:.5;
    transition:transform .18s ease,opacity .18s ease,color .18s ease}
  .link:hover .link__arrow,.link:focus-visible .link__arrow{transform:translateX(3px);opacity:1;color:var(--brand)}
  .link__arrow svg{width:18px;height:18px;display:block}

  .footer{margin-top:30px;font-size:12.5px;color:var(--ink-soft);opacity:.9;line-height:1.5}

  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
